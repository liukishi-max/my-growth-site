<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习惯发芽记</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --bg: #F1F4EC;
    --bg-card: #FFFFFF;
    --ink: #263528;
    --ink-soft: #5C6B5D;
    --green: #5B8C5A;
    --green-soft: #DCE9D8;
    --amber: #D9A544;
    --amber-soft: #F5E9CE;
    --brick: #BE5B4C;
    --brick-soft: #F3DCD8;
    --line: #DDE3D6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 32px 16px 64px;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { width: 100%; max-width: 480px; }

  header { margin-bottom: 28px; }

  .eyebrow {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 26px;
    margin: 0 0 8px;
    line-height: 1.3;
  }

  .habit-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--line);
    padding: 4px 2px;
    width: 100%;
    outline: none;
  }
  .habit-input:focus { border-bottom-color: var(--green); }

  /* avatar dress-up */
  .avatar-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(38,53,40,0.06);
  }

  .avatar-preview {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--green-soft);
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.15s ease;
    overflow: visible;
  }

  .avatar-face {
    width: 78px;
    height: 78px;
    display: block;
  }
  .avatar-face svg { width: 100%; height: 100%; display: block; }

  .avatar-accessory {
    position: absolute;
    top: -14px;
    font-size: 26px;
    line-height: 1;
    z-index: 2;
  }

  .avatar-name-input {
    display: block;
    width: 100%;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--line);
    padding: 4px 2px 8px;
    margin-bottom: 14px;
    outline: none;
  }
  .avatar-name-input:focus { border-bottom-color: var(--green); }
  .avatar-name-input::placeholder { color: #A6B0A2; font-weight: 400; }

  .avatar-name-display {
    display: none;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .confirm-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: var(--green);
    color: #fff;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .confirm-btn:active { opacity: 0.85; }

  .change-avatar-btn {
    display: none;
    margin: 4px auto 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
  }

  .avatar-row-label {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin: 10px 0 6px 2px;
  }

  .avatar-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .opt-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--bg);
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .opt-btn:active { transform: scale(0.94); }
  .opt-btn.picked { box-shadow: inset 0 0 0 2px var(--green); }

  .opt-btn.color-swatch { font-size: 0; }

  .opt-btn.face-opt {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    padding: 0;
    overflow: hidden;
    background: var(--bg);
  }
  .opt-btn.face-opt svg { width: 100%; height: 100%; display: block; }

  .opt-btn.text-opt {
    width: auto;
    padding: 0 14px;
    border-radius: 18px;
    font-size: 13px;
  }

  /* 发芽 signature */
  .plant-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 1px 3px rgba(38,53,40,0.06);
    margin-bottom: 20px;
  }

  .plant-svg { width: 120px; height: 120px; }

  .plant-caption {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  .plant-caption b { color: var(--ink); font-weight: 700; }

  /* buttons */
  .log-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .log-btn {
    border: none;
    border-radius: 14px;
    padding: 16px 6px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .log-btn:active { transform: scale(0.96); }
  .log-btn .dot { width: 22px; height: 22px; border-radius: 50%; }

  .log-btn.green { background: var(--green-soft); color: #2F4A30; }
  .log-btn.green .dot { background: var(--green); }
  .log-btn.amber { background: var(--amber-soft); color: #6B4E14; }
  .log-btn.amber .dot { background: var(--amber); }
  .log-btn.brick { background: var(--brick-soft); color: #6B2E23; }
  .log-btn.brick .dot { background: var(--brick); }

  .log-btn.selected { box-shadow: inset 0 0 0 2px currentColor; }

  .today-note {
    text-align: center;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: -10px 0 20px;
  }

  .done-state {
    display: none;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
    margin-bottom: 20px;
  }

  .done-msg {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .edit-today-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
  }

  /* history */
  .section-title {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    margin: 0 0 10px 2px;
  }

  .days {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 24px;
  }

  .day {
    flex: 0 0 auto;
    width: 38px;
    text-align: center;
  }

  .day .cell {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    margin: 0 auto 4px;
    background: var(--line);
  }
  .day .cell.g { background: var(--green); }
  .day .cell.a { background: var(--amber); }
  .day .cell.b { background: var(--brick); }

  .day .lbl { font-size: 10px; color: var(--ink-soft); }

  /* stats */
  .stat-row {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
  }

  .stat-card {
    flex: 1;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
  }

  .stat-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 700;
  }

  .stat-lbl {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .stat-delta {
    font-size: 12px;
    margin-top: 6px;
    font-weight: 500;
  }
  .stat-delta.up { color: var(--green); }
  .stat-delta.down { color: var(--brick); }
  .stat-delta.flat { color: var(--ink-soft); }

  footer {
    text-align: center;
    margin-top: 28px;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
  }

  .empty-note {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    padding: 20px 10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow" id="todayDate">习惯发芽记 · 记录主动性，不打分</div>
    <input class="habit-input" id="habitName" value="主动开始写作业" maxlength="20" />
  </header>

  <div class="avatar-card">
    <div class="avatar-preview" id="avatarPreview">
      <span class="avatar-accessory" id="avatarAccessory"></span>
      <span class="avatar-face" id="avatarFace"></span>
    </div>
    <div class="avatar-name-display" id="avatarNameDisplay"></div>
    <input class="avatar-name-input" id="avatarNameInput" placeholder="点这里给自己起个名字" maxlength="8" />

    <div id="avatarEditSection">
      <div class="avatar-row-label">选表情</div>
      <div class="avatar-options" id="faceOptions"></div>

      <div class="avatar-row-label">选颜色</div>
      <div class="avatar-options" id="colorOptions"></div>

      <div class="avatar-row-label">选配饰</div>
      <div class="avatar-options" id="accessoryOptions"></div>

      <div class="avatar-row-label">眼镜</div>
      <div class="avatar-options" id="glassesOptions"></div>

      <button class="confirm-btn" id="confirmAvatarBtn">就是它啦，确定</button>
    </div>

    <button class="change-avatar-btn" id="changeAvatarBtn">更换形象</button>
  </div>

  <div class="plant-card">
    <svg class="plant-svg" id="plantSvg" viewBox="0 0 120 120"></svg>
    <div class="plant-caption" id="plantCaption">开始记录，看看这两周会长成什么样</div>
  </div>

  <div class="log-row" id="logRow">
    <button class="log-btn green" data-v="g">
      <span class="dot"></span>今天主动开始
    </button>
    <button class="log-btn amber" data-v="a">
      <span class="dot"></span>提醒一次就好
    </button>
    <button class="log-btn brick" data-v="b">
      <span class="dot"></span>拖了挺久
    </button>
  </div>
  <div class="today-note" id="todayNote">今天还没记录</div>

  <div class="done-state" id="logDoneState">
    <div class="done-msg" id="doneMessage">今天已经打卡啦，明天再来哦 🌱</div>
    <button class="edit-today-btn" id="editTodayBtn">修改今天的记录</button>
  </div>

  <div class="section-title">最近14天</div>
  <div class="days" id="daysRow"></div>

  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-num" id="thisWeekPct">–</div>
      <div class="stat-lbl">本周主动比例</div>
      <div class="stat-delta" id="deltaLabel"></div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="streakNum">0</div>
      <div class="stat-lbl">连续记录天数</div>
    </div>
  </div>

  <footer>
    <button class="reset-btn" id="resetBtn">清空记录，重新开始</button>
  </footer>
</div>

<script>
const STORAGE_KEY = 'habit-tracker-entries';
const NAME_KEY = 'habit-tracker-name';
const AVATAR_KEY = 'habit-tracker-avatar';
let entries = {}; // { '2026-07-13': 'g' }

const FACE_CONFIGS = [
  { id: 'a', hair: '#3D2B1F', skin: '#FCE4CB', style: 'short' },
  { id: 'b', hair: '#8B5E3C', skin: '#FCE4CB', style: 'twintails' },
  { id: 'c', hair: '#2E2E2E', skin: '#F5D0A9', style: 'antenna' },
  { id: 'd', hair: '#C97B63', skin: '#FCE4CB', style: 'bun' },
  { id: 'e', hair: '#A0522D', skin: '#E8B588', style: 'curly' },
  { id: 'f', hair: '#1A1A1A', skin: '#FCE4CB', style: 'long' },
  { id: 'g', hair: '#D4A574', skin: '#F5D0A9', style: 'short' },
  { id: 'h', hair: '#5C4033', skin: '#FCE4CB', style: 'doublebun' },
];

const STROKE = '#4A3728';

function chibiSvgMarkup(cfg, withGlasses = false) {
  const hairBase = `<ellipse cx="50" cy="46" rx="46" ry="42" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/>`;
  let curly = '';
  if (cfg.style === 'curly') {
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const cx = (50 + Math.cos(angle) * 44).toFixed(1);
      const cy = (42 + Math.sin(angle) * 38).toFixed(1);
      curly += `<circle cx="${cx}" cy="${cy}" r="10" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2"/>`;
    }
  }
  const face = `<circle cx="50" cy="55" r="39" fill="${cfg.skin}" stroke="${STROKE}" stroke-width="2.5"/>`;

  let extra = '';
  if (cfg.style === 'twintails') {
    extra = `<ellipse cx="12" cy="66" rx="9" ry="20" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/><ellipse cx="88" cy="66" rx="9" ry="20" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/>`;
  } else if (cfg.style === 'antenna') {
    extra = `<path d="M50,8 C45,1 55,-3 59,4 C55,4 52,9 52,14" fill="none" stroke="${cfg.hair}" stroke-width="4" stroke-linecap="round"/>`;
  } else if (cfg.style === 'bun') {
    extra = `<circle cx="50" cy="9" r="11" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/>`;
  } else if (cfg.style === 'long') {
    extra = `<path d="M10,30 Q5,68 14,96 L27,96 Q20,60 23,28 Z" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/><path d="M90,30 Q95,68 86,96 L73,96 Q80,60 77,28 Z" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/>`;
  } else if (cfg.style === 'doublebun') {
    extra = `<circle cx="19" cy="18" r="10" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/><circle cx="81" cy="18" r="10" fill="${cfg.hair}" stroke="${STROKE}" stroke-width="2.5"/>`;
  }

  const eyes = `
    <ellipse cx="35" cy="59" rx="4.6" ry="6.2" fill="#33241D"/>
    <ellipse cx="65" cy="59" rx="4.6" ry="6.2" fill="#33241D"/>
    <circle cx="33.2" cy="56" r="1.5" fill="#FFFFFF"/>
    <circle cx="63.2" cy="56" r="1.5" fill="#FFFFFF"/>
    <path d="M27,48 Q35,44 43,48" fill="none" stroke="${cfg.hair}" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <path d="M57,48 Q65,44 73,48" fill="none" stroke="${cfg.hair}" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  `;
  const blush = `<ellipse cx="25" cy="69" rx="9" ry="5.5" fill="#F5A8A0" opacity="0.65"/><ellipse cx="75" cy="69" rx="9" ry="5.5" fill="#F5A8A0" opacity="0.65"/>`;
  const mouth = `<path d="M45,75 Q50,78.5 55,75" fill="none" stroke="${STROKE}" stroke-width="2" stroke-linecap="round"/>`;

  const glasses = withGlasses ? `
    <circle cx="35" cy="58" r="14" fill="#FFFFFF" opacity="0.12" stroke="${STROKE}" stroke-width="2.5"/>
    <circle cx="65" cy="58" r="14" fill="#FFFFFF" opacity="0.12" stroke="${STROKE}" stroke-width="2.5"/>
    <line x1="49" y1="57" x2="51" y2="57" stroke="${STROKE}" stroke-width="2.5"/>
    <line x1="21" y1="56" x2="14" y2="52" stroke="${STROKE}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="79" y1="56" x2="86" y2="52" stroke="${STROKE}" stroke-width="2.5" stroke-linecap="round"/>
  ` : '';

  return `<svg viewBox="0 0 100 100">${hairBase}${curly}${face}${extra}${eyes}${blush}${mouth}${glasses}</svg>`;
}

function getFaceConfig(id) {
  return FACE_CONFIGS.find(c => c.id === id) || FACE_CONFIGS[0];
}

const COLOR_OPTIONS = ['#DCE9D8','#F5E9CE','#F3DCD8','#DCE6F2','#EADCF2','#F2E6D8'];
const ACCESSORY_OPTIONS = ['无','👑','🎩','🎀','🌸','⭐','🕶️','🧢'];

let avatar = { face: 'a', color: '#DCE9D8', accessory: '无', glasses: false, name: '', confirmed: false };

function renderTodayDate() {
  const ds = todayStr(0);
  const d = new Date(ds + 'T00:00:00');
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const txt = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · ${weekdays[d.getDay()]}（美国中部时间）`;
  document.getElementById('todayDate').textContent = txt;
}

let editingAvatar = false;

function renderAvatar() {
  document.getElementById('avatarFace').innerHTML = chibiSvgMarkup(getFaceConfig(avatar.face), avatar.glasses);
  document.getElementById('avatarAccessory').textContent = avatar.accessory === '无' ? '' : avatar.accessory;
  document.getElementById('avatarPreview').style.background = avatar.color;

  const editSection = document.getElementById('avatarEditSection');
  const nameInput = document.getElementById('avatarNameInput');
  const nameDisplay = document.getElementById('avatarNameDisplay');
  const changeBtn = document.getElementById('changeAvatarBtn');

  if (!editingAvatar) {
    editSection.style.display = 'none';
    nameInput.style.display = 'none';
    changeBtn.style.display = 'block';
    changeBtn.textContent = avatar.confirmed ? '更换形象' : '自定义你自己的头像么？点击编辑';
    nameDisplay.style.display = avatar.name ? 'block' : 'none';
    nameDisplay.textContent = avatar.name;
    return;
  }

  editSection.style.display = 'block';
  nameInput.style.display = 'block';
  nameInput.value = avatar.name;
  changeBtn.style.display = 'none';
  nameDisplay.style.display = 'none';

  document.getElementById('faceOptions').innerHTML = FACE_CONFIGS.map(cfg =>
    `<button class="opt-btn face-opt ${cfg.id === avatar.face ? 'picked' : ''}" data-type="face" data-v="${cfg.id}">${chibiSvgMarkup(cfg, avatar.glasses)}</button>`
  ).join('');

  document.getElementById('colorOptions').innerHTML = COLOR_OPTIONS.map(c =>
    `<button class="opt-btn color-swatch ${c === avatar.color ? 'picked' : ''}" data-type="color" data-v="${c}" style="background:${c}"></button>`
  ).join('');

  document.getElementById('accessoryOptions').innerHTML = ACCESSORY_OPTIONS.map(a =>
    `<button class="opt-btn ${a === avatar.accessory ? 'picked' : ''}" data-type="accessory" data-v="${a}">${a === '无' ? '✕' : a}</button>`
  ).join('');

  document.getElementById('glassesOptions').innerHTML = `
    <button class="opt-btn text-opt ${!avatar.glasses ? 'picked' : ''}" data-type="glasses" data-v="off">不戴</button>
    <button class="opt-btn text-opt ${avatar.glasses ? 'picked' : ''}" data-type="glasses" data-v="on">戴眼镜</button>
  `;

  document.querySelectorAll('.avatar-options .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.type === 'glasses') {
        avatar.glasses = btn.dataset.v === 'on';
      } else {
        avatar[btn.dataset.type] = btn.dataset.v;
      }
      saveAvatar();
      renderAvatar();
    });
  });
}

function saveAvatar() {
  try { localStorage.setItem(AVATAR_KEY, JSON.stringify(avatar)); }
  catch (e) {}
}

function loadAvatar() {
  try {
    const raw = localStorage.getItem(AVATAR_KEY);
    if (raw) avatar = { ...avatar, ...JSON.parse(raw) };
  } catch (e) {}
}

function todayStr(offset = 0) {
  const t = Date.now() - offset * 86400000;
  // Always resolve "today" against US Central Time, regardless of the device's own timezone.
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Chicago',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date(t));
}

function weekdayShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return ['日','一','二','三','四','五','六'][d.getDay()];
}

async function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : {};
  } catch (e) { entries = {}; }
  try {
    const name = localStorage.getItem(NAME_KEY);
    if (name) document.getElementById('habitName').value = name;
  } catch (e) {}
  loadAvatar();
  renderTodayDate();
  renderAvatar();
  render();
}

async function saveEntries() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  catch (e) { console.error('save failed', e); }
}

async function saveName(v) {
  try { localStorage.setItem(NAME_KEY, v); }
  catch (e) {}
}

let editingToday = false;

function logToday(v) {
  entries[todayStr()] = v;
  editingToday = false;
  saveEntries();
  render();
}

function last14() {
  const arr = [];
  for (let i = 13; i >= 0; i--) {
    const ds = todayStr(i);
    arr.push({ date: ds, v: entries[ds] || null });
  }
  return arr;
}

function pct(arr) {
  const logged = arr.filter(x => x.v);
  if (logged.length === 0) return null;
  const green = logged.filter(x => x.v === 'g').length;
  return Math.round((green / logged.length) * 100);
}

function renderDays() {
  const row = document.getElementById('daysRow');
  row.innerHTML = '';
  last14().forEach(({ date, v }) => {
    const el = document.createElement('div');
    el.className = 'day';
    const cellClass = v === 'g' ? 'g' : v === 'a' ? 'a' : v === 'b' ? 'b' : '';
    el.innerHTML = `<div class="cell ${cellClass}"></div><div class="lbl">${weekdayShort(date)}</div>`;
    row.appendChild(el);
  });
}

function renderStats() {
  const all = last14();
  const thisWeek = all.slice(7, 14);
  const lastWeek = all.slice(0, 7);
  const tPct = pct(thisWeek);
  const lPct = pct(lastWeek);

  document.getElementById('thisWeekPct').textContent = tPct === null ? '–' : tPct + '%';

  const deltaEl = document.getElementById('deltaLabel');
  if (tPct === null || lPct === null) {
    deltaEl.textContent = '';
  } else {
    const diff = tPct - lPct;
    if (diff > 0) { deltaEl.textContent = `↑ 比上周高 ${diff}%`; deltaEl.className = 'stat-delta up'; }
    else if (diff < 0) { deltaEl.textContent = `↓ 比上周低 ${-diff}%`; deltaEl.className = 'stat-delta down'; }
    else { deltaEl.textContent = '与上周持平'; deltaEl.className = 'stat-delta flat'; }
  }

  // streak of consecutive logged days ending today
  let streak = 0;
  for (let i = 0; i < 30; i++) {
    if (entries[todayStr(i)]) streak++; else break;
  }
  document.getElementById('streakNum').textContent = streak;
}

function renderTodayState() {
  const t = entries[todayStr()];
  document.querySelectorAll('.log-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.v === t);
  });

  const logRow = document.getElementById('logRow');
  const todayNote = document.getElementById('todayNote');
  const doneState = document.getElementById('logDoneState');

  if (t && !editingToday) {
    logRow.style.display = 'none';
    todayNote.style.display = 'none';
    doneState.style.display = 'block';
  } else {
    logRow.style.display = 'grid';
    todayNote.style.display = 'block';
    doneState.style.display = 'none';
    todayNote.textContent = t ? '今天已记录，点其他选项可修改' : '今天还没记录';
  }
}

// plant grows with overall green ratio across all logged days
function renderPlant() {
  const logged = Object.values(entries);
  const svg = document.getElementById('plantSvg');
  const caption = document.getElementById('plantCaption');

  if (logged.length === 0) {
    svg.innerHTML = seedSvg();
    caption.textContent = '开始记录，看看这两周会长成什么样';
    return;
  }

  const greenCount = logged.filter(v => v === 'g').length;
  const ratio = greenCount / logged.length;
  const days = logged.length;

  let stage;
  if (days < 3) stage = 0;
  else if (ratio < 0.3) stage = 1;
  else if (ratio < 0.55) stage = 2;
  else if (ratio < 0.8) stage = 3;
  else stage = 4;

  svg.innerHTML = plantStageSvg(stage);
  const labels = [
    '刚种下种子，再记录几天看看',
    '开始发芽了',
    '长出第一片叶子',
    '枝叶渐渐多了起来',
    '长成一小片绿意'
  ];
  caption.innerHTML = `${labels[stage]} · 共记录 <b>${days}</b> 天，主动 <b>${Math.round(ratio*100)}%</b>`;
}

function seedSvg() {
  return `<circle cx="60" cy="95" r="4" fill="#5B8C5A" opacity="0.5"/>
  <ellipse cx="60" cy="108" rx="30" ry="6" fill="#DCE9D8"/>`;
}

function plantStageSvg(stage) {
  const soil = `<ellipse cx="60" cy="108" rx="34" ry="6" fill="#DCE9D8"/>`;
  const stem = h => `<line x1="60" y1="105" x2="60" y2="${105-h}" stroke="#5B8C5A" stroke-width="3" stroke-linecap="round"/>`;
  const leaf = (x,y,rot,scale=1) => `<ellipse cx="${x}" cy="${y}" rx="${11*scale}" ry="6*scale" fill="#5B8C5A" transform="rotate(${rot} ${x} ${y})"/>`;
  const leafPath = (x,y,rot,scale=1) => `<path d="M0,0 C 8,-10 22,-8 24,0 C 22,8 8,10 0,0 Z" fill="#6FA36D" transform="translate(${x} ${y}) rotate(${rot}) scale(${scale})"/>`;

  if (stage === 1) {
    return soil + stem(18) + leafPath(60,87,-30,0.6) ;
  }
  if (stage === 2) {
    return soil + stem(30) + leafPath(60,80,-35,0.75) + leafPath(60,80,35,0.75);
  }
  if (stage === 3) {
    return soil + stem(45) + leafPath(60,68,-40,0.9) + leafPath(60,68,40,0.9) + leafPath(60,52,-20,0.8) + leafPath(60,52,20,0.8);
  }
  if (stage === 4) {
    return soil + stem(58)
      + leafPath(60,58,-45,1) + leafPath(60,58,45,1)
      + leafPath(60,42,-15,0.95) + leafPath(60,42,15,0.95)
      + leafPath(60,28,-40,0.8) + leafPath(60,28,40,0.8)
      + `<circle cx="60" cy="22" r="4" fill="#D9A544"/>`;
  }
  return soil + `<circle cx="60" cy="98" r="4" fill="#5B8C5A" opacity="0.6"/>`;
}

function render() {
  renderPlant();
  renderTodayState();
  renderDays();
  renderStats();
}

document.querySelectorAll('.log-btn').forEach(btn => {
  btn.addEventListener('click', () => logToday(btn.dataset.v));
});

document.getElementById('editTodayBtn').addEventListener('click', () => {
  editingToday = true;
  renderTodayState();
});

document.getElementById('habitName').addEventListener('change', (e) => {
  saveName(e.target.value);
});

document.getElementById('avatarNameInput').addEventListener('change', (e) => {
  avatar.name = e.target.value;
  saveAvatar();
});

document.getElementById('confirmAvatarBtn').addEventListener('click', () => {
  avatar.name = document.getElementById('avatarNameInput').value;
  avatar.confirmed = true;
  editingAvatar = false;
  saveAvatar();
  renderAvatar();
});

document.getElementById('changeAvatarBtn').addEventListener('click', () => {
  editingAvatar = true;
  renderAvatar();
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('确定要清空所有记录吗？这个操作无法撤销。')) return;
  entries = {};
  await saveEntries();
  render();
});

loadData();
</script>
</body>
